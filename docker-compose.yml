services:
  # ─────────────────── POSTGRES ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pastry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pastry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pastry_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pastry_inventory}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pastry_user} -d ${POSTGRES_DB:-pastry_inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pastry_network

  # ─────────────────── REDIS ───────────────────
  redis:
    image: redis:7-alpine
    container_name: pastry_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pastry_network

  # ─────────────────── BACKEND (FastAPI) ───────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pastry_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pastry_user}:${POSTGRES_PASSWORD:-pastry_secret}@postgres:5432/${POSTGRES_DB:-pastry_inventory}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-pastry_user}:${POSTGRES_PASSWORD:-pastry_secret}@postgres:5432/${POSTGRES_DB:-pastry_inventory}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-3600}
      SECRET_KEY: ${SECRET_KEY:-changeme-use-openssl-rand-hex-32-in-prod}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: '["http://localhost:3000"]'
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@pastry.local}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Admin@12345}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - pastry_network

  # ─────────────────── FRONTEND (Next.js) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: pastry_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: "PastryStock Manager"
      NEXT_PUBLIC_APP_VERSION: "1.0.0"
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-nextauth-secret-changeme}
      NEXTAUTH_URL: http://localhost:3000
      # Los bind-mounts de Docker en Windows/macOS no emiten eventos inotify:
      # sin sondeo, `next dev` no recompila al editar archivos desde el host.
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - pastry_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pastry_network:
    driver: bridge
    name: pastry_net
